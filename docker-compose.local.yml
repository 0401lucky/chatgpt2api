services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api-go:local
    container_name: chatgpt2api-go-local
    restart: unless-stopped
    ports:
      - "${CHATGPT2API_PORT:-8000}:80"
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-go-backend-local-key}
      CHATGPT2API_PROXY: ${CHATGPT2API_PROXY:-}
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
