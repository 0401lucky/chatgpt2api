services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api-go:latest
    container_name: chatgpt2api-go
    restart: unless-stopped
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}
      CHATGPT2API_PROXY: ${CHATGPT2API_PROXY:-}
    ports:
      - "${CHATGPT2API_PORT:-3000}:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
